<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#000;--bg2:#080808;--bg3:#0d0d0d;
  --border:#1e1e1e;--border2:#2a2a2a;
  --green:#00ff9d;--blue:#00d4ff;--purple:#bc13fe;
  --yellow:#f5c518;--orange:#ff9944;--red:#ff4444;
  --white:#ffffff;--g1:#cccccc;--g2:#888888;--g3:#444444;--g4:#222222;
}
body{background:var(--bg);color:var(--white);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;min-height:100vh;font-size:14px;}

/* ── TOP NAV ── */
.nav{display:flex;background:#040404;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:200;}
.nav-uni{display:flex;flex:1;border-right:1px solid var(--border);}
.uni-btn{flex:1;padding:14px 6px;border:none;background:none;font-size:10px;font-weight:700;letter-spacing:1.5px;cursor:pointer;transition:all .2s;color:var(--g3);border-bottom:2px solid transparent;font-family:inherit;}
.uni-btn.soft.active{color:var(--green);border-bottom-color:var(--green);}
.uni-btn.hard.active{color:var(--yellow);border-bottom-color:var(--yellow);}
.nav-tabs{display:flex;flex:2;}
.tab-btn{flex:1;padding:14px 4px;border:none;background:none;color:var(--g3);font-size:10px;font-weight:700;letter-spacing:1px;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;font-family:inherit;}
.tab-btn.active{color:var(--green);border-bottom-color:var(--green);}

/* ── SCAN CHIPS ── */
.scan-bar{background:#040404;border-bottom:1px solid var(--border);padding:6px 12px;display:flex;gap:5px;overflow-x:auto;align-items:center;-webkit-overflow-scrolling:touch;}
.scan-bar::-webkit-scrollbar{display:none;}
.scan-lbl{color:var(--g3);font-size:9px;letter-spacing:1px;white-space:nowrap;font-weight:700;}
.chip{padding:4px 10px;border-radius:3px;border:1px solid var(--border2);background:none;color:var(--g3);font-size:9px;cursor:pointer;white-space:nowrap;font-family:inherit;letter-spacing:.5px;}
.chip.active{border-color:rgba(0,255,157,.4);background:rgba(0,255,157,.07);color:var(--green);font-weight:700;}
.chip.active.hard{border-color:rgba(245,197,24,.4);background:rgba(245,197,24,.07);color:var(--yellow);}

/* ── TABLE ── */
.container{padding:12px;}
table{width:100%;border-collapse:collapse;}
th{text-align:left;color:var(--g3);font-size:10px;padding:8px 10px;border-bottom:1px solid var(--border2);text-transform:uppercase;letter-spacing:.5px;font-weight:400;}
td{padding:13px 10px;border-bottom:1px solid #0e0e0e;vertical-align:middle;}
tr.stock-row{cursor:pointer;}
tr.stock-row:active td,tr.stock-row.open td{background:#0a0a0a;}
.ticker{font-weight:700;font-size:16px;color:var(--blue);letter-spacing:1px;}
.score-big{font-weight:700;font-size:17px;}
.score-max{color:var(--g3);font-size:9px;margin-left:1px;}
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 7px;border-radius:3px;font-size:10px;font-weight:600;}
.b-green{background:rgba(0,255,157,.1);border:1px solid rgba(0,255,157,.3);color:var(--green);}
.b-yellow{background:rgba(245,197,24,.1);border:1px solid rgba(245,197,24,.3);color:var(--yellow);}
.b-red{background:rgba(255,68,68,.1);border:1px solid rgba(255,68,68,.3);color:var(--red);}
.b-none{color:var(--g3);}
.pts{font-size:8px;opacity:.45;font-weight:400;}
.warn{font-size:9px;}
.expand-arrow{color:var(--g3);font-size:10px;transition:transform .2s;}
.expand-arrow.open{transform:rotate(180deg);}
.cluster-icon{font-size:13px;}

/* ── DETAIL PANEL ── */
.detail-td{padding:0!important;border-bottom:1px solid var(--border2)!important;}
.detail-pane{background:#050505;padding:16px;animation:fadeIn .25s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.d-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;}
.d-name{font-size:20px;font-weight:700;color:var(--blue);letter-spacing:1.5px;}
.d-score{font-size:24px;font-weight:700;}
.d-meta{color:var(--g3);font-size:10px;margin-top:3px;letter-spacing:.5px;}
.chart-section{margin-bottom:14px;}
.chart-title{color:var(--g3);font-size:9px;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;}
.chart-box{background:#020202;border:1px solid var(--border);border-radius:4px;padding:10px 8px 6px;overflow:hidden;}
.legend{display:flex;gap:12px;flex-wrap:wrap;margin-top:7px;}
.leg-item{display:flex;align-items:center;gap:5px;font-size:9px;color:var(--g2);}
.leg-line{width:14px;height:2px;border-radius:1px;}
.no-chart{color:var(--g3);font-size:11px;padding:20px;text-align:center;letter-spacing:1px;}

/* ── INFO CARDS ── */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));gap:8px;margin-top:12px;}
.card{background:var(--bg2);border:1px solid var(--border2);border-radius:6px;padding:12px;}
.card-title{color:var(--g3);font-size:8px;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;}
.cluster-row{margin-bottom:5px;padding-bottom:5px;border-bottom:1px solid var(--border);}
.cluster-tickers{color:var(--g3);font-size:10px;margin-top:2px;padding-left:16px;}

/* ── UPLOAD ── */
.upload-wrap{padding:16px;max-width:560px;}
.upload-title{font-size:12px;font-weight:700;letter-spacing:2px;color:var(--green);margin-bottom:18px;}
.upload-title.hard{color:var(--yellow);}
.field{margin-bottom:12px;}
.field label{display:block;color:var(--g3);font-size:9px;letter-spacing:1px;margin-bottom:4px;text-transform:uppercase;}
.field input[type=date],.field input[type=text]{background:var(--bg2);border:1px solid var(--border2);color:var(--white);padding:9px 11px;border-radius:4px;font-size:12px;width:100%;outline:none;font-family:inherit;}
.drop-zone{border:2px dashed var(--g4);border-radius:8px;padding:32px 16px;text-align:center;cursor:pointer;background:var(--bg2);transition:all .2s;margin-bottom:12px;}
.drop-zone:hover,.drop-zone.drag{border-color:var(--green);background:rgba(0,255,157,.04);}
.drop-zone.ready{border-color:rgba(0,255,157,.4);border-style:solid;}
.drop-icon{font-size:32px;margin-bottom:8px;}
.drop-main{color:var(--g2);font-size:12px;line-height:1.8;}
.drop-main.ok{color:var(--green);font-weight:600;}
.drop-sub{color:var(--g3);font-size:10px;margin-top:3px;}
.preview{background:#040404;border:1px solid var(--border);border-radius:4px;padding:10px;margin-bottom:12px;}
.preview-lbl{color:var(--g3);font-size:8px;letter-spacing:1px;margin-bottom:4px;text-transform:uppercase;}
.preview-txt{color:var(--g3);font-size:9px;white-space:pre;overflow-x:auto;line-height:1.6;max-height:80px;}
.err{color:var(--red);font-size:10px;min-height:14px;margin-bottom:8px;}
.btn-add{background:var(--green);color:#000;border:none;padding:11px 24px;border-radius:5px;font-weight:700;font-size:12px;cursor:pointer;letter-spacing:1.5px;font-family:inherit;transition:opacity .2s;}
.btn-add.hard{background:var(--yellow);}
.btn-add:disabled{opacity:.35;cursor:not-allowed;}
details summary{color:var(--g3);font-size:9px;letter-spacing:1px;cursor:pointer;margin-top:14px;text-transform:uppercase;user-select:none;}
textarea{background:var(--bg2);border:1px solid var(--border2);color:var(--white);padding:10px;border-radius:4px;font-size:10px;width:100%;resize:vertical;line-height:1.7;outline:none;margin-top:7px;font-family:'Courier New',monospace;}
.schema{margin-top:18px;padding:13px;background:var(--bg2);border:1px solid var(--border2);border-radius:6px;}
.schema-ttl{color:var(--g3);font-size:8px;letter-spacing:2px;margin-bottom:9px;text-transform:uppercase;}
.schema-row{display:flex;gap:10px;margin-bottom:4px;}
.schema-k{color:rgba(0,255,157,.5);min-width:90px;font-size:10px;font-family:'Courier New',monospace;}
.schema-v{color:var(--g3);font-size:10px;}

/* ── COMPARE ── */
.compare-wrap{padding:12px;overflow-x:auto;}
.compare-ttl{color:var(--g3);font-size:9px;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;}

/* ── MANAGE ── */
.manage-wrap{padding:16px;}
.manage-ttl{font-size:11px;font-weight:700;letter-spacing:2px;color:var(--green);margin-bottom:14px;text-transform:uppercase;}
.manage-ttl.hard{color:var(--yellow);}
.scan-item{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);gap:10px;}
.scan-info{flex:1;min-width:0;}
.scan-name{color:var(--white);font-weight:600;font-size:13px;}
.scan-meta{color:var(--g3);font-size:10px;margin-top:2px;}
.seed-tag{color:rgba(0,255,157,.3);font-size:8px;margin-left:6px;letter-spacing:1px;}
.btn-view{padding:5px 11px;background:rgba(0,255,157,.07);border:1px solid rgba(0,255,157,.2);color:var(--green);border-radius:4px;cursor:pointer;font-size:9px;font-weight:700;font-family:inherit;letter-spacing:.5px;}
.btn-del{padding:5px 11px;background:rgba(255,68,68,.07);border:1px solid rgba(255,68,68,.2);color:var(--red);border-radius:4px;cursor:pointer;font-size:9px;font-weight:700;font-family:inherit;letter-spacing:.5px;}

/* ── EMPTY ── */
.empty{text-align:center;padding:60px 20px;}
.empty-icon{font-size:36px;margin-bottom:12px;}
.empty-txt{color:var(--g3);font-size:12px;letter-spacing:1px;margin-bottom:16px;text-transform:uppercase;}
</style>
</head>

// ════════════════════════════════════════════════════════════════
// SCORING — 100 Punkte System
// ════════════════════════════════════════════════════════════════
function ratio(s){return s.ratio??(s.v1m&&s.v1w?s.v1m/s.v1w:null);}
function pATR(v){if(v==null)return 0;if(v<2.5)return 20;if(v<=3.2)return 12;if(v<=4.0)return 8;return 0;}
function pV1W(v){if(v==null)return 0;if(v<2.0)return 20;if(v<=2.5)return 12;return 0;}
function pRAT(v){if(v==null)return 0;if(v>1.15)return 20;if(v>=1.0)return 10;return 0;}
function pRV(v){if(v==null)return 0;if(v<0.7)return 20;if(v<=1.2)return 10;return 0;}
function pRSI(v){if(v==null)return 0;if(v>=45&&v<=65)return 20;if(v>65&&v<=80)return 15;return 0;}
function score(s){
  const r=ratio(s);
  return pATR(s.atr)+pV1W(s.v1w)+pRAT(r)+pRV(s.rv)+pRSI(s.rsi);
}
function scoreColor(n){if(n>=80)return"#00ff9d";if(n>=60)return"#f5c518";if(n>=40)return"#ff9944";return"#ff4444";}
function badgeCls(pts){const p=pts/20;if(p>=0.9)return"badge b-green";if(p>=0.5)return"badge b-yellow";return"badge b-red";}

// ════════════════════════════════════════════════════════════════
// CSV PARSER — erkennt echte TradingView-Header automatisch
// ════════════════════════════════════════════════════════════════
function parseCSV(text){
  function splitLine(line){
    const r=[];let c="";let q=false;
    for(let i=0;i<line.length;i++){const ch=line[i];if(ch==='"'){q=!q;}else if(ch===','&&!q){r.push(c.trim());c="";}else c+=ch;}
    r.push(c.trim());return r;
  }
  const lines=text.trim().split(/\r?\n/);
  if(lines.length<2)return[];
  const hdrs=splitLine(lines[0]).map(h=>h.replace(/^"|"$/g,"").trim().toLowerCase());
  return lines.slice(1).map(line=>{
    const cols=splitLine(line);
    const row={};hdrs.forEach((h,i)=>{row[h]=(cols[i]||"").replace(/^"|"$/g,"").trim();});
    const n=(...keys)=>{for(const k of keys){if(row[k]!==undefined){const v=parseFloat(row[k]);if(!isNaN(v))return v;}const fk=Object.keys(row).find(rk=>rk.includes(k));if(fk){const v=parseFloat(row[fk]);if(!isNaN(v))return v;}}return null;};
    const atr=n("atr","average true range % (14) 1 tag","average true range");
    const v1w=n("vola1w","v1w","volatilität 1 woche","volatilitat 1 woche","vola 1w");
    const v1m=n("vola1m","v1m","volatilität 1 monat","volatilitat 1 monat","vola 1m");
    const rv=n("relvol","rv","relatives volumen 1 tag","relatives volumen","rel vol");
    const rsi=n("rsi","relative strength index (14) 1 tag","relative strength index");
    const rat=n("ratio")??(v1m&&v1w?v1m/v1w:null);
    const t=(row.ticker||row.symbol||"").toUpperCase();
    const sec=row.sector||row.sektor||row.branche||"";
    if(!t)return null;
    return{t,atr,v1w,v1m,ratio:rat,rv,rsi,sec};
  }).filter(Boolean);
}

function buildScan(date,label,raw){
  const stocks=raw.map(s=>({...s,ratio:s.ratio??(s.v1m&&s.v1w?s.v1m/s.v1w:null)}));
  stocks.sort((a,b)=>score(b)-score(a));
  // cluster top10
  const top=stocks.slice(0,10);
  const map={};top.forEach(s=>{if(s.sec)map[s.sec]=(map[s.sec]||[]).concat(s.t);});
  const cs=new Set(Object.entries(map).filter(([,v])=>v.length>=3).map(([k])=>k));
  stocks.forEach(s=>s.cluster=cs.has(s.sec));
  return{id:Date.now()+Math.floor(Math.random()*9999),date,label:label||date,stocks};
}

// ════════════════════════════════════════════════════════════════
// HISTORY — alle Datenpunkte eines Tickers über alle Scans
// ════════════════════════════════════════════════════════════════
function getHistory(ticker){
  return U().scans.map(sc=>{
    const s=sc.stocks.find(x=>x.t===ticker);
    if(!s)return null;
    const r=ratio(s);
    return{date:sc.date,label:sc.label,atr:s.atr,v1w:s.v1w,rsi:s.rsi,rv:s.rv,ratio:r,score:score(s)};
  }).filter(Boolean).sort((a,b)=>a.date.localeCompare(b.date));
}

// ════════════════════════════════════════════════════════════════
// SVG CHARTS — 3-Panel VCP Layout (Minervini-optimiert)
// ════════════════════════════════════════════════════════════════
function buildCharts(ticker){
  const hist=getHistory(ticker);
  if(hist.length<1)return`<div class="no-chart">Keine History.</div>`;
  if(hist.length<2)return`<div class="no-chart" style="padding:16px;color:#444;font-size:11px;letter-spacing:1px">Nur 1 Datenpunkt – lade weitere Scans für Verlauf.</div>`;

  const W=320,PL=34,PR=10,PT=10,PB=20;
  const N=hist.length;
  const IW=W-PL-PR;
  function px(i){return PL+i*(IW/(N-1||1));}
  function py(v,mn,mx,H){const ih=H-PT-PB;if(mx===mn)return PT+ih/2;return PT+ih*(1-(v-mn)/(mx-mn));}
  function mm(arr){const v=arr.filter(x=>x!=null&&!isNaN(x));if(!v.length)return[0,1];return[Math.min(...v),Math.max(...v)];}
  function pline(pts,col,sw=1.8,dash=""){return`<polyline points="${pts}" fill="none" stroke="${col}" stroke-width="${sw}" stroke-linejoin="round" stroke-linecap="round"${dash?` stroke-dasharray="${dash}"`:""}/>`;}
  function dot(cx,cy,col,r=2.2){return`<circle cx="${cx}" cy="${cy}" r="${r}" fill="${col}" stroke="#000" stroke-width="0.8"/>`;}
  function gridH(y){return`<line x1="${PL}" y1="${y}" x2="${W-PR}" y2="${y}" stroke="#0f0f0f" stroke-width="1"/>`;}
  function ylab(txt,y,col="#444",anchor="end",x=PL-3){return`<text x="${x}" y="${y}" font-size="7.5" fill="${col}" text-anchor="${anchor}" dominant-baseline="middle" font-family="inherit">${txt}</text>`;}
  function xlab(txt,x,y){return`<text x="${x}" y="${y}" font-size="7" fill="#2e2e2e" text-anchor="middle" font-family="inherit">${txt}</text>`;}
  function axisL(H){return`<line x1="${PL}" y1="${PT}" x2="${PL}" y2="${H-PB}" stroke="#1e1e1e" stroke-width="1"/>`;}
  function chartLabel(txt,col,x,y){return`<text x="${x}" y="${y}" font-size="8" fill="${col}" font-weight="600" font-family="inherit">${txt}</text>`;}

  // ── CHART 1: Volatilität ATR% + Vola1W% (eigene %-Achse) ──
  const H1=130;
  const atrs=hist.map(h=>h.atr);
  const v1ws=hist.map(h=>h.v1w);
  const [vMin0,vMax0]=mm([...atrs,...v1ws]);
  const vMin=Math.max(0,vMin0*0.88);
  const vMax=vMax0*1.08;

  // Schatten zwischen ATR (oben) und Vola1W (unten) = sichtbare Kontraktion
  const atrTop=atrs.map((v,i)=>`${px(i).toFixed(1)},${py(v,vMin,vMax,H1).toFixed(1)}`).join(" ");
  const v1wBot=[...v1ws].map((v,i)=>`${px(N-1-i).toFixed(1)},${py(v,vMin,vMax,H1).toFixed(1)}`).reverse().join(" ");
  const shadow=`<polygon points="${atrTop} ${v1wBot}" fill="rgba(0,212,255,0.06)" stroke="none"/>`;

  // Y-Achse mit echten %-Werten (4 Stufen)
  const ySteps=[vMin,(vMin+vMax)/2,vMax].map(v=>{
    const y=py(v,vMin,vMax,H1);
    return gridH(y.toFixed(1))+ylab(v.toFixed(1)+"%",y.toFixed(1));
  }).join("");

  const atrPts=atrs.map((v,i)=>`${px(i).toFixed(1)},${py(v,vMin,vMax,H1).toFixed(1)}`).join(" ");
  const v1wPts=v1ws.map((v,i)=>`${px(i).toFixed(1)},${py(v,vMin,vMax,H1).toFixed(1)}`).join(" ");
  const atrDots=atrs.map((v,i)=>dot(px(i).toFixed(1),py(v,vMin,vMax,H1).toFixed(1),"#00d4ff")).join("");
  const v1wDots=v1ws.map((v,i)=>dot(px(i).toFixed(1),py(v,vMin,vMax,H1).toFixed(1),"#ff9944")).join("");

  // Inline-Labels an letztem Punkt
  const lastAtrY=py(atrs[N-1],vMin,vMax,H1);
  const lastV1wY=py(v1ws[N-1],vMin,vMax,H1);
  const inlineLbls=`
    ${chartLabel("ATR","#00d4ff",W-PR+2,lastAtrY.toFixed(1))}
    ${chartLabel("V1W","#ff9944",W-PR+2,(lastV1wY+9).toFixed(1))}`;

  const xLbls1=hist.map((h,i)=>xlab(h.date.slice(5),px(i).toFixed(1),(H1-PB+13))).join("");

  const svg1=`<svg viewBox="0 0 ${W} ${H1}" style="width:100%;display:block;overflow:visible">
    ${ySteps}${shadow}
    ${pline(atrPts,"#00d4ff",2)}${atrDots}
    ${pline(v1wPts,"#ff9944",2)}${v1wDots}
    ${axisL(H1)}${inlineLbls}${xLbls1}
  </svg>`;

  // ── CHART 2: RSI kompakt als Area + Zonen ──
  const H2=80;
  const rsis=hist.map(h=>h.rsi);
  const rMin=35,rMax=85; // feste, sinnvolle RSI-Achse

  const z45=py(45,rMin,rMax,H2),z65=py(65,rMin,rMax,H2),z80=py(80,rMin,rMax,H2);
  const zones=`
    <rect x="${PL}" y="${PT}" width="${IW}" height="${(z80-PT).toFixed(1)}" fill="rgba(255,100,68,.05)"/>
    <rect x="${PL}" y="${z80.toFixed(1)}" width="${IW}" height="${(z65-z80).toFixed(1)}" fill="rgba(245,197,24,.06)"/>
    <rect x="${PL}" y="${z65.toFixed(1)}" width="${IW}" height="${(z45-z65).toFixed(1)}" fill="rgba(0,255,157,.07)"/>
    <rect x="${PL}" y="${z45.toFixed(1)}" width="${IW}" height="${(H2-PB-z45).toFixed(1)}" fill="rgba(255,100,68,.05)"/>`;
  const refLines=[{v:45,col:"rgba(255,100,68,.35)"},{v:65,col:"rgba(0,255,157,.4)"},{v:80,col:"rgba(245,197,24,.35)"}].map(({v,col})=>{
    const y=py(v,rMin,rMax,H2);
    return`<line x1="${PL}" y1="${y.toFixed(1)}" x2="${W-PR}" y2="${y.toFixed(1)}" stroke="${col}" stroke-width="0.7" stroke-dasharray="3,2"/>
    ${ylab(v,y.toFixed(1))}`;
  }).join("");

  const rsiPts=rsis.map((v,i)=>`${px(i).toFixed(1)},${py(v,rMin,rMax,H2).toFixed(1)}`).join(" ");
  const rsiArea=`<polygon points="${px(0).toFixed(1)},${(H2-PB).toFixed(1)} ${rsiPts} ${px(N-1).toFixed(1)},${(H2-PB).toFixed(1)}" fill="rgba(188,19,254,.08)" stroke="none"/>`;
  const rsiDots=rsis.map((v,i)=>{
    const col=v>=45&&v<=65?"#00ff9d":v>65&&v<=80?"#f5c518":"#ff6644";
    return dot(px(i).toFixed(1),py(v,rMin,rMax,H2).toFixed(1),col,2.5);
  }).join("");
  const lastRsiY=py(rsis[N-1],rMin,rMax,H2);
  const xLbls2=hist.map((h,i)=>xlab(h.date.slice(5),px(i).toFixed(1),(H2-PB+13))).join("");

  const svg2=`<svg viewBox="0 0 ${W} ${H2}" style="width:100%;display:block;overflow:visible">
    ${zones}${refLines}${rsiArea}
    ${pline(rsiPts,"#bc13fe",1.8)}${rsiDots}
    ${axisL(H2)}
    ${chartLabel("RSI","#bc13fe",W-PR+2,lastRsiY.toFixed(1))}
    ${xLbls2}
  </svg>`;

  // ── CHART 3: RelVol dünne Balken + Ratio Linie ──
  const H3=85;
  const rvs=hist.map(h=>h.rv);
  const rvMax=Math.max(...rvs,1.6);
  const ratAll=hist.map(h=>h.ratio).filter(x=>x!=null);
  const [ratMin,ratMax]=mm([...ratAll,0.85,1.25]);
  // Balken sehr schmal — wie professionelle Trading-Charts
  const bw=Math.max(2,Math.min(6,Math.floor(IW/N/2.5)));

  const bars=rvs.map((v,i)=>{
    const bh=(H3-PT-PB)*(Math.min(v,rvMax)/rvMax);
    const x=px(i)-bw/2;
    const y=H3-PB-bh;
    const col=v<0.7?"#00ff9d":v<=1.2?"#f5c518":"#ff4444";
    return`<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw}" height="${bh.toFixed(1)}" fill="${col}" opacity="${v<0.7?0.9:0.6}" rx="1"/>`;
  }).join("");

  const y10=H3-PB-((H3-PT-PB)*(1.0/rvMax));
  const ref10=`<line x1="${PL}" y1="${y10.toFixed(1)}" x2="${W-PR}" y2="${y10.toFixed(1)}" stroke="rgba(255,255,255,.18)" stroke-width="1" stroke-dasharray="4,3"/>
  ${ylab("1.0",y10.toFixed(1),"#444")}`;

  const ratPts2=hist.map((h,i)=>h.ratio!=null?`${px(i).toFixed(1)},${py(h.ratio,ratMin,ratMax,H3).toFixed(1)}`:null).filter(Boolean).join(" ");
  const y115=py(1.15,ratMin,ratMax,H3);
  const ratRef=`<line x1="${PL}" y1="${y115.toFixed(1)}" x2="${W-PR}" y2="${y115.toFixed(1)}" stroke="rgba(0,212,255,.25)" stroke-width="0.8" stroke-dasharray="3,2"/>`;
  const ratDots3=hist.map((h,i)=>{
    if(h.ratio==null)return"";
    const col=h.ratio>1.15?"#00ff9d":h.ratio>=1.0?"#f5c518":"#ff4444";
    return dot(px(i).toFixed(1),py(h.ratio,ratMin,ratMax,H3).toFixed(1),col,2.5);
  }).join("");
  const lastRatY=hist[N-1].ratio!=null?py(hist[N-1].ratio,ratMin,ratMax,H3):PT;
  const xLbls3=hist.map((h,i)=>xlab(h.date.slice(5),px(i).toFixed(1),(H3-PB+13))).join("");

  const rvLabels=[0,rvMax].map(v=>{
    const y=H3-PB-((H3-PT-PB)*(v/rvMax));
    return ylab(v.toFixed(1),y.toFixed(1));
  }).join("");

  const svg3=`<svg viewBox="0 0 ${W} ${H3}" style="width:100%;display:block;overflow:visible">
    ${gridH((H3-PB-(H3-PT-PB)*0.5).toFixed(1))}
    ${bars}${ref10}${ratRef}
    ${ratPts2?pline(ratPts2,"rgba(0,212,255,.75)",1.5):""}
    ${ratDots3}
    ${axisL(H3)}${rvLabels}
    ${chartLabel("RV","#888",W-PR+2,(H3-PB).toFixed(1))}
    ${chartLabel("Ratio","#00d4ff",W-PR+2,lastRatY.toFixed(1))}
    ${xLbls3}
  </svg>`;

  // Score-Badges
  const scoreRow=hist.map(h=>{
    const col=h.score>=80?"#00ff9d":h.score>=60?"#f5c518":h.score>=40?"#ff9944":"#ff4444";
    return`<div style="text-align:center;flex:1;min-width:0"><div style="color:${col};font-weight:700;font-size:12px;line-height:1">${h.score}</div><div style="color:#2a2a2a;font-size:7px;margin-top:2px">${h.date.slice(5)}</div></div>`;
  }).join("");

  const chartBox=(title,svg,extra="")=>`
    <div class="chart-section">
      <div class="chart-title" style="font-size:9px;letter-spacing:1.5px;color:#333;margin-bottom:5px">${title}</div>
      <div style="background:#050505;border:1px solid #141414;border-radius:3px;padding:8px 2px 2px;overflow:hidden">${svg}</div>
      ${extra}
    </div>`;

  return`
    <div style="display:flex;gap:4px;margin-bottom:12px;padding:8px 10px;background:#080808;border:1px solid #141414;border-radius:4px;align-items:center">
      <div style="font-size:8px;color:#2a2a2a;letter-spacing:1.5px;white-space:nowrap;margin-right:4px">SCORE</div>
      ${scoreRow}
    </div>
    ${chartBox("VOLATILITÄT — ATR% (CYAN) · VOLA 1W% (ORANGE) · Schatten = Kontraktion",svg1)}
    ${chartBox("RSI (14) — 🟢 45–65 SWEET SPOT · 🟡 65–80 MOMENTUM",svg2)}
    ${chartBox("REL. VOLUMEN (Balken) · RATIO-LINIE (Cyan) · Ref. 1.15",svg3,`
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:6px;padding:0 4px">
        <div style="display:flex;align-items:center;gap:4px;font-size:9px;color:#444"><div style="width:8px;height:8px;background:#00ff9d;border-radius:1px"></div>RV &lt;0.7 ✓</div>
        <div style="display:flex;align-items:center;gap:4px;font-size:9px;color:#444"><div style="width:8px;height:8px;background:#f5c518;border-radius:1px"></div>0.7–1.2</div>
        <div style="display:flex;align-items:center;gap:4px;font-size:9px;color:#444"><div style="width:8px;height:8px;background:#ff4444;border-radius:1px"></div>&gt;1.2 ⚠</div>
        <div style="display:flex;align-items:center;gap:4px;font-size:9px;color:#444"><div style="width:10px;height:2px;background:#00d4ff;border-radius:1px"></div>Ratio</div>
      </div>`)}`;
}

// STORAGE
// ════════════════════════════════════════════════════════════════
function loadAll(){
  ["soft","hard"].forEach(u=>{
    const st=state[u];
    try{
      const raw=localStorage.getItem(st.key);
      if(raw){
        const saved=JSON.parse(raw);
        const ids=new Set(saved.map(s=>s.id));
        st.scans=[...st.seeds.filter(s=>!ids.has(s.id)),...saved];
      }else{st.scans=[...st.seeds];localStorage.setItem(st.key,JSON.stringify(st.scans));}
    }catch(e){st.scans=[...st.seeds];}
  });
  setDot(true);
}
function saveU(){try{localStorage.setItem(U().key,JSON.stringify(U().scans));setDot(true);}catch(e){setDot(false);}}
function setDot(ok){
  const d=document.getElementById("dot"),l=document.getElementById("dot-lbl");
  if(!d)return;
  d.style.background=ok?"#00ff9d":"#ff4444";
  d.style.boxShadow=ok?"0 0 5px #00ff9d":"0 0 5px #ff4444";
  l.style.color=ok?"rgba(0,255,157,.5)":"rgba(255,68,68,.5)";
  l.textContent=ok?"STORAGE OK":"OFFLINE";
}

function switchUni(u){
  uni=u;expandedTicker=null;
  ["soft","hard"].forEach(x=>{document.getElementById("uni-"+x).classList.toggle("active",x===u);});
  document.querySelectorAll(".tab-btn").forEach(b=>b.style.color=u==="hard"?"":""/*let CSS handle*/);
  render();
}
function switchTab(i){
  curTab=i;expandedTicker=null;
  document.querySelectorAll(".tab-btn").forEach((b,j)=>b.classList.toggle("active",i===j));
  [0,1,2,3].forEach(j=>document.getElementById("tab"+j).style.display=i===j?"block":"none");
  const bar=document.getElementById("scan-bar");
  bar.style.display=(i===0||i===1)&&U().scans.length?"flex":"none";
  render();
}
function renderChips(){
  const st=U();
  document.getElementById("scan-chips").innerHTML=st.scans.map((s,i)=>{
    const cls="chip"+(i===st.sel?" active"+(uni==="hard"?" hard":""):"");
    return`<button class="${cls}" onclick="selScan(${i})">${s.label}</button>`;
  }).join("");
  document.getElementById("scan-bar").style.display=(curTab===0||curTab===1)&&st.scans.length?"flex":"none";

  renderChips();

  if(curTab===3)renderManage();
}

// ── TOP 10 ──
function renderTop10(){
  const el=document.getElementById("tab0");
  const st=U();
  if(!st.scans.length){
    el.innerHTML=`<div class="empty"><div class="empty-icon">📊</div><div class="empty-txt">NOCH KEINE SCANS</div><button class="btn-add${uni==="hard"?" hard":""}" onclick="switchTab(2)" style="border-radius:5px;padding:11px 22px;background:${uni==="hard"?"#f5c518":"#00ff9d"};color:#000;border:none;font-weight:700;cursor:pointer;font-size:12px;letter-spacing:1px;">+ SCAN HINZUFÜGEN</button></div>`;
    return;
  }
  const scan=st.scans[st.sel];
  const top10=scan.stocks.slice(0,10);

  function badge(val,pts,fmt,flag){
    if(val==null)return`<td><span class="b-none">—</span></td>`;
    const cls=badgeCls(pts);
    return`<td><span class="${cls}">${fmt(val)}${flag?` <span class="warn">${flag}</span>`:""}<span class="pts"> (${pts})</span></span></td>`;
  }

  let rows="";
  top10.forEach((s,i)=>{
    const sc=score(s);
    const r=ratio(s);
    const open=expandedTicker===s.t;
    rows+=`<tr class="stock-row${open?" open":""}" onclick="toggleDetail('${s.t}')">
      <td style="width:22px;color:#444;font-size:11px">${i+1}</td>
      <td class="ticker">${s.t}</td>
      <td><span class="score-big" style="color:${scoreColor(sc)}">${sc}</span><span class="score-max">/100</span></td>
      ${badge(s.atr,pATR(s.atr),v=>v.toFixed(2)+"%","")}
      ${badge(s.v1w,pV1W(s.v1w),v=>v.toFixed(2)+"%","")}
      <td style="color:#444;font-size:11px">${s.v1m!=null?s.v1m.toFixed(2)+"%":"—"}</td>
      ${badge(r,pRAT(r),v=>v.toFixed(3),r!=null&&r<1?"⚠️":"")}
      ${badge(s.rv,pRV(s.rv),v=>v.toFixed(2),"")}
      ${badge(s.rsi,pRSI(s.rsi),v=>v.toFixed(1),"")}
      <td style="text-align:center;font-size:13px">${s.cluster?"🔥":""}</td>
      <td style="text-align:center"><span class="expand-arrow${open?" open":""}">▼</span></td>
    </tr>
    ${open?`<tr><td class="detail-td" colspan="11"><div class="detail-pane">${buildDetail(s,sc)}</div></td></tr>`:""}`;
  });

  el.innerHTML=`<div class="container" style="padding-bottom:0">
    <table>
      <thead><tr>
        <th>#</th><th>TICKER</th><th>SCORE</th>
        <th>ATR%</th><th>V1W%</th><th>V1M%</th>
        <th>RATIO</th><th>RELVOL</th><th>RSI</th>
        <th>CLU</th><th></th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>
  ${renderInfoCards(top10)}`;
}

function buildDetail(s,sc){
  const hist=getHistory(s.t);
  return`
    <div class="d-header">
      <div>
        <div class="d-name">${s.t}</div>
        <div class="d-meta">${s.sec||"—"} · ${hist.length} Scan${hist.length!==1?"s":""}</div>
      </div>
      <div class="d-score" style="color:${scoreColor(sc)}">${sc}<span style="font-size:13px;color:#333">/100</span></div>
    </div>
    ${buildCharts(s.t)}`;
}

function toggleDetail(ticker){
  expandedTicker=expandedTicker===ticker?null:ticker;
  renderTop10();
}

// ── INFO CARDS ──
function renderInfoCards(top10){
  const map={};top10.forEach(s=>{if(s.sec)map[s.sec]=(map[s.sec]||[]).concat(s.t);});
  const clusters=Object.entries(map).filter(([,v])=>v.length>=2).sort((a,b)=>b[1].length-a[1].length);
  const expansions=top10.filter(s=>{const r=ratio(s);return r!=null&&r<1.0;});
  const leader=top10[0];

  const clHtml=clusters.length?clusters.map(([sec,tickers])=>{
    const icon=tickers.length>=3?"🔥":"🔶";
    const col=tickers.length>=3?"#f5c518":"#ff9944";
    return`<div class="cluster-row"><div style="display:flex;align-items:center;gap:5px"><span>${icon}</span><span style="color:${col};font-weight:700;font-size:12px">${sec}</span><span style="color:#333;font-size:9px;margin-left:auto">${tickers.length}×</span></div><div class="cluster-tickers">${tickers.join(" · ")}</div></div>`;
  }).join(""):`<span style="color:#333;font-size:11px">Kein Cluster.</span>`;

  const lsc=leader?score(leader):0;
  const ldHtml=leader?`<div style="color:#00ff9d;font-weight:700;font-size:16px">${leader.t} — ${lsc} Pkt</div><div style="color:#333;font-size:10px;margin-top:5px;line-height:2">ATR ${leader.atr?.toFixed(2)}% · V1W ${leader.v1w?.toFixed(2)}%<br>Ratio ${ratio(leader)?.toFixed(3)} · RV ${leader.rv?.toFixed(2)} · RSI ${leader.rsi?.toFixed(1)}</div>`:"—";

  const expHtml=expansions.length?expansions.map(s=>`<div style="color:#ff6677;margin-bottom:3px;font-size:12px">${s.t} <span style="color:#333">Ratio ${ratio(s)?.toFixed(3)}</span></div>`).join(""):`<span style="color:#333;font-size:11px">Keine.</span>`;

  return`<div class="container"><div class="cards">
    <div class="card"><div class="card-title">SEKTOR-CLUSTER</div>${clHtml}</div>
    <div class="card"><div class="card-title">ANFÜHRER</div>${ldHtml}</div>
    <div class="card"><div class="card-title">VOLA-EXPANSIONEN ⚠️</div>${expHtml}</div>
  </div></div>`;
}

// ── COMPARE ──
function renderCompare(){
  const el=document.getElementById("tab1");
  const st=U();
  if(st.scans.length<2){el.innerHTML=`<div style="color:#333;text-align:center;padding:60px;font-size:11px;letter-spacing:1px">MINDESTENS 2 SCANS ERFORDERLICH.</div>`;return;}
  const allT=[...new Set(st.scans.flatMap(s=>s.stocks.map(x=>x.t)))].slice(0,30);
  const sm={};st.scans.forEach(sc=>sc.stocks.forEach(stk=>{if(!sm[stk.t])sm[stk.t]={};sm[stk.t][sc.id]=score(stk);}));
  const headers=st.scans.map((s,i)=>`<th style="color:${i===st.sel?"#00ff9d":"#333"};text-align:center;min-width:75px">${s.label}</th>`).join("");
  const rows=allT.map(t=>{
    const row=st.scans.map(s=>sm[t]?.[s.id]??null);
    const cells=row.map((sc,i)=>{
      if(sc===null)return`<td style="text-align:center;color:#1a1a1a">—</td>`;
      const prev=row[i-1];const d=sc!==null&&prev!==null?sc-prev:null;
      const dHtml=d!==null?`<span style="font-size:9px;margin-left:3px;color:${d>0?"#00ff9d":d<0?"#ff4444":"#333"}">${d>0?"▲"+d:d<0?"▼"+Math.abs(d):"="}</span>`:"";
      return`<td style="text-align:center"><span style="color:${scoreColor(sc)};font-weight:700">${sc}${dHtml}</span></td>`;
    }).join("");
    return`<tr style="border-bottom:1px solid #0e0e0e"><td style="padding:8px 10px;color:#fff;font-weight:700;font-size:13px;letter-spacing:.5px">${t}</td>${cells}</tr>`;
  }).join("");
  el.innerHTML=`<div class="compare-wrap"><div class="compare-ttl">SCORE-VERGLEICH · ${uni.toUpperCase()} · TOP 30</div><table><thead><tr><th style="min-width:75px">TICKER</th>${headers}</tr></thead><tbody>${rows}</tbody></table></div>`;
}

// ── UPLOAD ──
function renderUpload(){
  const el=document.getElementById("tab2");
  const f=U().form;
  el.innerHTML=`<div class="upload-wrap">
    <div class="upload-title${uni==="hard"?" hard":""}">${uni==="soft"?"🟢":"🟡"} NEUER SCAN — ${uni.toUpperCase()}</div>
    <div class="field"><label>Datum</label><input type="date" id="f-date" value="${f.date}"></div>
    <div class="field"><label>Label (optional)</label><input type="text" id="f-label" placeholder="z.B. Di KW18" value="${f.label}"></div>
    <div class="drop-zone${f.file?" ready":""}" id="dz" onclick="document.getElementById('fi').click()">
      <div class="drop-icon">📂</div>
      <div class="drop-main${f.file?" ok":""}">${f.file?`✓ ${f.file}<br><span class="drop-sub">Tippen zum Ersetzen</span>`:"CSV-Datei tippen oder ablegen"}</div>
      ${!f.file?`<div class="drop-sub" style="margin-top:4px">Symbol, ATR, Volatilität 1W/1M, RSI, Rel.Vol, Sektor</div>`:""}
    </div>
    <input type="file" id="fi" accept=".csv,text/csv" style="display:none" multiple>
    ${f.csv?`<div class="preview"><div class="preview-lbl">Vorschau</div><div class="preview-txt">${esc(f.csv.split("\n").slice(0,4).join("\n"))}${f.csv.split("\n").length>4?"\n…":""}</div></div>`:""}
    <div class="err" id="ferr"></div>
    <button class="btn-add${uni==="hard"?" hard":""}" onclick="doAdd()" ${!f.csv?"disabled":""}>SCAN HINZUFÜGEN →</button>
    <details><summary>Manuelle CSV-Eingabe</summary>
      <textarea id="ftxt" rows="7" placeholder="Symbol,Average True Range % (14) 1 Tag,...">${esc(f.csv)}</textarea>
      <button onclick="applyTxt()" style="margin-top:5px;padding:6px 13px;background:#111;border:1px solid #222;color:#00ff9d;cursor:pointer;border-radius:4px;font-size:10px;font-family:inherit;">ÜBERNEHMEN</button>
    </details>
    <div class="schema"><div class="schema-ttl">Bewertungsschema</div>
      ${[["ATR (14)%","<2.5→20 · 2.5–3.2→12 · 3.2–4.0→8 · >4.0→0"],["VOLA 1W %","<2.0→20 · 2.0–2.5→12 · >2.5→0"],["RATIO 1M/1W",">1.15→20 · 1.0–1.15→10 · <1.0→0 ⚠️"],["RELVOL","<0.7→20 · 0.7–1.2→10 · >1.2→0"],["RSI (14)","45–65→20 · 65–80→15 · sonst→0"]].map(([k,v])=>`<div class="schema-row"><span class="schema-k">${k}</span><span class="schema-v">${v}</span></div>`).join("")}
    </div>
  </div>`;
  document.getElementById("f-date").oninput=e=>U().form.date=e.target.value;
  document.getElementById("f-label").oninput=e=>U().form.label=e.target.value;
  const dz=document.getElementById("dz");
  dz.ondragover=e=>{e.preventDefault();dz.classList.add("drag");};
  dz.ondragleave=()=>dz.classList.remove("drag");
  dz.ondrop=e=>{e.preventDefault();dz.classList.remove("drag");handleFile(e.dataTransfer.files[0]);};
  document.getElementById("fi").onchange=e=>{
    const files=Array.from(e.target.files);
    if(files.length===1){handleFile(files[0]);return;}
    // Mehrere Dateien: alle einlesen, dann chronologisch einfügen
    let done=0;
    files.forEach(file=>{
      const r=new FileReader();
      r.onload=ev=>{
        const raw=parseCSV(ev.target.result);
        if(raw.length){
          const dm=file.name.match(/(\d{4}-\d{2}-\d{2})/);
          const date=dm?dm[1]:new Date().toISOString().slice(0,10);
          const label=file.name.replace(/\.csv$/i,"").replace(/_/g," ");
          const sc=buildScan(date,label,raw);
          // Doppelte vermeiden
          if(!U().scans.some(s=>s.date===date&&s.stocks.length===sc.stocks.length)){
            U().scans.push(sc);
          }
        }
        done++;
        if(done===files.length){
          sortScansChronologically();
          saveU();
          expandedTicker=null;
          switchTab(0);
        }
      };
      r.readAsText(file);
    });
  };
}
function esc(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function handleFile(file){
  if(!file)return;
  const r=new FileReader();
  r.onload=e=>{
    const f=U().form;f.csv=e.target.result;f.file=file.name;
    const dm=file.name.match(/(\d{4}-\d{2}-\d{2})/);if(dm)f.date=dm[1];
    if(!f.label)f.label=file.name.replace(/\.csv$/i,"").replace(/_/g," ");
    renderUpload();
  };
  r.readAsText(file);
}
function sortScansChronologically(){
  U().scans.sort((a,b)=>a.date.localeCompare(b.date));
  // sel auf letzten Scan setzen
  U().sel=U().scans.length-1;
}
function applyTxt(){const ta=document.getElementById("ftxt");if(ta){U().form.csv=ta.value;U().form.file="";renderUpload();}}
function doAdd(){
  const f=U().form;
  f.date=document.getElementById("f-date")?.value||f.date;
  f.label=document.getElementById("f-label")?.value||f.label;
  const err=document.getElementById("ferr");
  if(!f.csv){err.textContent="Keine Daten.";return;}
  const raw=parseCSV(f.csv);
  if(!raw.length){err.textContent="CSV konnte nicht geparst werden.";return;}
  const sc=buildScan(f.date,f.label,raw);
  U().scans.push(sc);
  sortScansChronologically();
  saveU();
  U().form={date:new Date().toISOString().slice(0,10),label:"",csv:"",file:""};
  expandedTicker=null;switchTab(0);
}

// ── MANAGE ──
function renderManage(){
  const el=document.getElementById("tab3");
  const st=U();
  // storage indicator
  const dotHtml=`<div style="display:flex;align-items:center;gap:6px;margin-bottom:14px">
    <span id="dot" style="width:7px;height:7px;border-radius:50%;background:#333;display:inline-block"></span>
    <span id="dot-lbl" style="font-size:9px;color:#333;letter-spacing:1px">…</span>
  </div>`;
  const rows=st.scans.map((s,i)=>{
    const isSeed=st.seedIds.has(s.id);
    const top=s.stocks[0]?score(s.stocks[0]):0;
    return`<div class="scan-item">
      <div class="scan-info">
        <div class="scan-name">${s.label}${isSeed?`<span class="seed-tag">SEED</span>`:""}</div>
        <div class="scan-meta">${s.date} · ${s.stocks.length} Aktien · Top: <span style="color:${scoreColor(top)}">${top}</span> Pkt</div>
      </div>
      <div style="display:flex;gap:6px;flex-shrink:0">
        <button class="btn-view" onclick="selScan(${i});switchTab(0)">ANZEIGEN</button>
        ${!isSeed?`<button class="btn-del" id="del-${s.id}" onclick="confirmDel(${s.id})">LÖSCHEN</button>`:""}
      </div>
    </div>`;
  }).join("");
  el.innerHTML=`<div class="manage-wrap">
    ${dotHtml}
    <div class="manage-ttl${uni==="hard"?" hard":""}">${uni==="soft"?"🟢":"🟡"} ${uni.toUpperCase()} — SCANS</div>
    ${st.scans.length?rows:`<div style="color:#333;font-size:11px">Noch keine Scans.</div>`}
  </div>`;
  setDot(true);
}
function confirmDel(id){
  const btn=document.getElementById("del-"+id);if(!btn)return;
  if(btn.dataset.armed==="1"){delScan(id);}
  else{btn.dataset.armed="1";btn.textContent="SICHER?";btn.style.background="rgba(255,68,68,.2)";
    setTimeout(()=>{if(btn&&btn.dataset.armed==="1"){btn.dataset.armed="0";btn.textContent="LÖSCHEN";btn.style.background="";}},3000);}
}
function delScan(id){U().scans=U().scans.filter(s=>s.id!==id);saveU();U().sel=Math.max(0,Math.min(U().sel,U().scans.length-1));render();}

if("serviceWorker" in navigator){
  const sw=`const C="vcp-v4";self.addEventListener("install",e=>{e.waitUntil(caches.open(C).then(c=>c.addAll(["./"])));self.skipWaiting();});self.addEventListener("activate",e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))));self.clients.claim();});self.addEventListener("fetch",e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>caches.match("./"))));});`;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:"application/javascript"})),{scope:"./"}).catch(()=>{});
}
let deferredPrompt=null;
window.addEventListener("beforeinstallprompt",e=>{e.preventDefault();deferredPrompt=e;showInstallBanner();});
function showInstallBanner(){
  if(document.getElementById("ib"))return;
  const b=document.createElement("div");b.id="ib";
  b.style.cssText="position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:#0a0a0a;border:1px solid rgba(0,255,157,.3);border-radius:8px;padding:12px 14px;display:flex;align-items:center;gap:10px;z-index:999;box-shadow:0 4px 24px rgba(0,255,157,.15);max-width:300px;width:90%";
  b.innerHTML=`<div style="flex:1"><div style="color:#00ff9d;font-size:11px;font-weight:700;letter-spacing:1px">ALS APP INSTALLIEREN</div><div style="color:#444;font-size:9px;margin-top:2px">Zum Homescreen hinzufügen</div></div><button onclick="doInstall()" style="background:#00ff9d;color:#000;border:none;padding:7px 12px;border-radius:4px;font-weight:700;font-size:10px;cursor:pointer;font-family:inherit;">INSTALL</button><button onclick="this.parentElement.remove()" style="background:none;border:none;color:#444;font-size:18px;cursor:pointer;line-height:1">✕</button>`;
  document.body.appendChild(b);
}
function doInstall(){if(!deferredPrompt)return;deferredPrompt.prompt();deferredPrompt.userChoice.then(()=>{deferredPrompt=null;const b=document.getElementById("ib");if(b)b.remove();});}
window.addEventListener("load",()=>{
  if(!window.matchMedia("(display-mode:standalone)").matches&&!navigator.standalone&&!sessionStorage.getItem("ib-done")){
    setTimeout(()=>{if(!deferredPrompt){
      if(document.getElementById("ib"))return;
      const b=document.createElement("div");b.id="ib";
      b.style.cssText="position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:#0a0a0a;border:1px solid rgba(0,255,157,.3);border-radius:8px;padding:12px 14px;display:flex;align-items:center;gap:10px;z-index:999;box-shadow:0 4px 24px rgba(0,255,157,.15);max-width:300px;width:90%";
      b.innerHTML=`<div style="flex:1"><div style="color:#00ff9d;font-size:11px;font-weight:700;letter-spacing:1px">ALS APP SPEICHERN</div><div style="color:#444;font-size:9px;margin-top:2px">Menü → "Zum Startbildschirm"</div></div><button onclick="sessionStorage.setItem('ib-done','1');this.parentElement.remove()" style="background:none;border:none;color:#444;font-size:18px;cursor:pointer;line-height:1">✕</button>`;
      document.body.appendChild(b);

});
